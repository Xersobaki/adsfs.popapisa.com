<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой новый проект / Портфолио</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Растягивает видео без черных полос по бокам */
        }
    </style>
</head>
<body>

    <video id="prankVideo" autoplay playsinline>
        <source src="video.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

    <script>
        // Небольшой костыль: если браузер заблокировал автоплей без звука,
        // при первом же клике пользователя по экрану видео включится на полную
        document.body.addEventListener('click', function() {
            var video = document.getElementById('prankVideo');
            if (video.paused) {
                video.play();
            }
        });
    </script>

</body>
</html>
